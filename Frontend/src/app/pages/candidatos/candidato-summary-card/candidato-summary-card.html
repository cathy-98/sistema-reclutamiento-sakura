<aside class="candidate-card">
  <app-avatar [initials]="initials"></app-avatar>
  <h3>{{ cargo }}</h3>
  <p>Santiago, Chile</p>
  <dl>
    <div>
      <dt>Correo</dt>
      <dd>{{ correo }}</dd>
    </div>
    <div>
      <dt>Teléfono</dt>
      <dd>{{ telefono }}</dd>
    </div>
    <div>
      <dt>Disponibilidad</dt>
      <dd>{{ disponibilidad }}</dd>
    </div>
    <div>
      <dt>Expectativa salarial</dt>
      <dd>{{ renta }}</dd>
    </div>
    <div>
      <dt>Modalidad preferida</dt>
      <dd>Híbrida</dd>
    </div>
  </dl>
</aside>

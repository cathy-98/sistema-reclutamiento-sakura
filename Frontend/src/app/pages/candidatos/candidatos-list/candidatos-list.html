<app-page-layout>
  <app-page-header
    title="Listado de candidatos"
    subtitle="Carga CVs, revisa candidatos y gestiona acciones del proceso."
    [badge]="rolUsuario"
  >
    <div pageHeaderActions>
      <button class="secondary-action" type="button">Realizar match</button>
    </div>
  </app-page-header>

  <app-file-dropzone
    title="Carga CVs de candidatos"
    description="Arrastra uno o más CVs para dejarlos listos antes de procesarlos."
    buttonText="Seleccionar CVs"
    [allowedExtensions]="['pdf', 'doc', 'docx']"
    [maxFileSizeMb]="10"
    (filesChange)="actualizarArchivosCv($event)"
  ></app-file-dropzone>

  <app-filter-panel
    description="Usa uno o más campos para encontrar candidatos."
    quickSearchPlaceholder="Nombre, correo, cargo o solicitud"
    [(quickSearch)]="busquedaRapida"
    (search)="buscar()"
    (clear)="limpiarFiltros()"
  >
    <label>
      ID solicitud
      <input [(ngModel)]="filtros.idSolicitud" type="text" placeholder="Req-021" />
    </label>
    <label>
      Cargo postulado
      <input [(ngModel)]="filtros.cargo" type="text" placeholder="Frontend" />
    </label>
    <label>
      Nombre completo
      <input [(ngModel)]="filtros.nombre" type="text" placeholder="Todos" />
    </label>
    <label>
      Correo electrónico
      <input [(ngModel)]="filtros.correo" type="email" placeholder="Todos" />
    </label>
    <label>
      Número de teléfono
      <input [(ngModel)]="filtros.telefono" type="text" placeholder="Numeración" />
    </label>
    <label>
      Estado del candidato
      <select [(ngModel)]="filtros.estado">
        <option *ngFor="let estado of estados" [ngValue]="estado">{{ estado }}</option>
      </select>
    </label>
    <label>
      Disponibilidad
      <input [(ngModel)]="filtros.disponibilidad" type="text" placeholder="Todos" />
    </label>
    <label>
      Pretensión de renta
      <input [(ngModel)]="filtros.renta" type="number" min="0" placeholder="Numérico" />
    </label>
    <label>
      Match
      <input [(ngModel)]="filtros.match" type="number" min="0" max="100" placeholder="Ingresa num." />
    </label>
    <label>
      Nivel
      <select [(ngModel)]="filtros.nivel">
        <option value="">Todos</option>
        <option *ngFor="let nivel of niveles" [ngValue]="nivel">{{ nivel }}</option>
      </select>
    </label>
    <label>
      Años de experiencia
      <input [(ngModel)]="filtros.experiencia" type="number" min="0" placeholder="0,00" />
    </label>
  </app-filter-panel>

  <app-action-bar
    [message]="mensajeAccionesMasivas"
    aria-label="Acciones masivas"
    *ngIf="!cargando && !errorCarga && candidatosFiltrados.length > 0"
  >
    <button type="button" [disabled]="seleccionados.size === 0">
      <span aria-hidden="true">✓</span>
      Enviar correo
    </button>
    <button type="button" [disabled]="seleccionados.size === 0">
      <span aria-hidden="true">✦</span>
      Agendar entrevistas
    </button>
  </app-action-bar>

  <app-data-table
    title="Listado de candidatos"
    [columns]="columnas"
    [rows]="candidatosPaginados"
    [total]="candidatosFiltrados.length"
    [page]="paginaActual"
    [pageSize]="registrosPorPagina"
    [loading]="cargando"
    [errorMessage]="errorCarga"
    loadingMessage="Cargando candidatos..."
    [rowId]="obtenerIdCandidato"
    [actions]="acciones"
    [selectedIds]="seleccionados"
    emptyTitle="No hay candidatos para mostrar"
    emptyMessage="Ajusta los filtros o limpia la búsqueda para volver al listado completo."
    (selectedIdsChange)="seleccionados = $event"
    (pageChange)="cambiarPagina($event)"
    (pageSizeChange)="cambiarRegistrosPorPagina($event)"
    (actionClick)="manejarAccionTabla($event)"
    (clear)="limpiarFiltros()"
    (retry)="cargarCandidatos()"
  ></app-data-table>

  <app-candidato-perfil-modal
    *ngIf="candidatoSeleccionado"
    [candidato]="candidatoSeleccionado"
    (cerrar)="cerrarPerfilCandidato()"
  ></app-candidato-perfil-modal>
</app-page-layout>

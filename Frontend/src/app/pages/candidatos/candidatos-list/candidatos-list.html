<main class="candidates-page">
  <section class="welcome-panel">
    <div>
      <h1>Bienvenido, {{ nombreUsuario }}</h1>
      <p class="session-role" *ngIf="rolUsuario">{{ rolUsuario }}</p>
      <p>Gestión listado de candidatos</p>
    </div>
    <img src="/images/Logos/logo_sakura.png" alt="Perfil" />
  </section>

  <section class="action-strip" aria-label="Acciones de candidatos">
    <button class="secondary-button" type="button">Realizar match</button>
  </section>

  <app-file-dropzone
    title="Carga CVs de candidatos"
    description="Arrastra uno o más CVs para dejarlos listos antes de procesarlos."
    buttonText="Seleccionar CVs"
    [allowedExtensions]="['pdf', 'doc', 'docx']"
    [maxFileSizeMb]="10"
    (filesChange)="actualizarArchivosCv($event)"
  ></app-file-dropzone>

  <section class="filters-panel" aria-label="Filtros de candidatos">
    <header class="filters-header">
      <div>
        <h3>Buscar y filtrar</h3>
        <p>Usa uno o más campos para encontrar candidatos.</p>
      </div>
      <label class="quick-search">
        Búsqueda rápida
        <input
          [(ngModel)]="busquedaRapida"
          type="search"
          placeholder="Nombre, correo, cargo o solicitud"
          (ngModelChange)="buscar()"
        />
      </label>
    </header>

    <div class="filters-grid">
      <label>
        ID solicitud
        <input [(ngModel)]="filtros.idSolicitud" type="text" placeholder="Req-021" />
      </label>
      <label>
        Cargo postulado
        <input [(ngModel)]="filtros.cargo" type="text" placeholder="Frontend" />
      </label>
      <label>
        Nombre completo
        <input [(ngModel)]="filtros.nombre" type="text" placeholder="Todos" />
      </label>
      <label>
        Correo electrónico
        <input [(ngModel)]="filtros.correo" type="email" placeholder="Todos" />
      </label>
      <label>
        Número de teléfono
        <input [(ngModel)]="filtros.telefono" type="text" placeholder="Numeración" />
      </label>
      <label>
        Estado del candidato
        <select [(ngModel)]="filtros.estado">
          <option *ngFor="let estado of estados" [ngValue]="estado">{{ estado }}</option>
        </select>
      </label>
      <label>
        Disponibilidad
        <input [(ngModel)]="filtros.disponibilidad" type="text" placeholder="Todos" />
      </label>
      <label>
        Pretensión de renta
        <input [(ngModel)]="filtros.renta" type="number" min="0" placeholder="Numérico" />
      </label>
      <label>
        Match
        <input [(ngModel)]="filtros.match" type="number" min="0" max="100" placeholder="Ingresa num." />
      </label>
      <label>
        Nivel
        <select [(ngModel)]="filtros.nivel">
          <option value="">Todos</option>
          <option *ngFor="let nivel of niveles" [ngValue]="nivel">{{ nivel }}</option>
        </select>
      </label>
      <label>
        Años de experiencia
        <input [(ngModel)]="filtros.experiencia" type="number" min="0" placeholder="0,00" />
      </label>
    </div>

    <div class="filter-actions">
      <button class="ghost-button" type="button" (click)="limpiarFiltros()">Limpiar filtros</button>
      <button class="primary-small-button" type="button" (click)="buscar()">Buscar</button>
    </div>
  </section>

  <section class="bulk-actions" aria-label="Acciones masivas">
    <button type="button" [disabled]="seleccionados.size === 0">
      <span aria-hidden="true">✓</span>
      Enviar correo
    </button>
    <button type="button" [disabled]="seleccionados.size === 0">
      <span aria-hidden="true">✦</span>
      Agendar entrevistas
    </button>
    <p *ngIf="seleccionados.size === 0">Selecciona candidatos para habilitar acciones masivas.</p>
    <p *ngIf="seleccionados.size > 0">{{ seleccionados.size }} candidatos seleccionados.</p>
  </section>

  <app-data-table
    title="Listado de candidatos"
    [columns]="columnas"
    [rows]="candidatosPaginados"
    [total]="candidatosFiltrados.length"
    [page]="paginaActual"
    [pageSize]="registrosPorPagina"
    [rowId]="obtenerIdCandidato"
    [actions]="acciones"
    [selectedIds]="seleccionados"
    emptyTitle="No hay candidatos para mostrar"
    emptyMessage="Ajusta los filtros o limpia la búsqueda para volver al listado completo."
    (selectedIdsChange)="seleccionados = $event"
    (pageChange)="cambiarPagina($event)"
    (pageSizeChange)="cambiarRegistrosPorPagina($event)"
    (actionClick)="manejarAccionTabla($event)"
    (clear)="limpiarFiltros()"
  ></app-data-table>
</main>

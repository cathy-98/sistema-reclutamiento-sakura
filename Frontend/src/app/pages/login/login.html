<section class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <img src="/images/Logos/logo_sakura.png" alt="Sakura" />
    </div>

    <header class="login-header">
      <h1>¡Bienvenido!</h1>
      <p>Accede a tu cuenta para comenzar.</p>
    </header>

    <form class="login-form" (ngSubmit)="ingresar()">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input name="email" type="email" placeholder="Ingresa tu correo" [(ngModel)]="email" />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input name="password" type="password" placeholder="Ingresa tu contraseña" [(ngModel)]="password" />
      </div>

      <a class="forgot-password">¿Olvidaste tu contraseña?</a>

      <button type="submit">Ingresar</button>
    </form>


  </div>
</section>

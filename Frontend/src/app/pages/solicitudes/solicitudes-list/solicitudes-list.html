<main class="requests-page">
  <app-page-header
    title="Listado de solicitudes"
    subtitle="Gestión listado de solicitudes"
  >
    <div pageHeaderActions>
      <button class="primary-action" type="button" *ngIf="puedeCrearSolicitud" (click)="abrirFormulario()">
        <span aria-hidden="true">+</span>
        Crear nueva solicitud
      </button>
    </div>
  </app-page-header>

  <app-filter-panel
    description="Usa uno o más campos para encontrar solicitudes."
    quickSearchPlaceholder="Solicitud, cliente, cargo o responsable"
    [(quickSearch)]="filtros.busquedaRapida"
    (search)="buscar()"
    (clear)="limpiarFiltros()"
  >
    <app-alert
      *ngIf="alerta"
      [tipo]="alerta.tipo"
      [variante]="alerta.variante"
      [titulo]="alerta.titulo || ''"
      [mensaje]="alerta.mensaje"
      [cerrable]="true"
      (cerrar)="cerrarAlerta()"
    ></app-alert>

    <label>
      ID solicitud
      <input [(ngModel)]="filtros.id" type="text" placeholder="Req-021" />
    </label>

    <label>
      Nombre de solicitud
      <input [(ngModel)]="filtros.nombre" type="text" placeholder="Todos" />
    </label>

    <label>
      Cliente
      <input [(ngModel)]="filtros.cliente" type="text" placeholder="Todos" />
    </label>

    <label>
      Cargo solicitado
      <input [(ngModel)]="filtros.cargo" type="text" placeholder="Frontend" />
    </label>

    <label>
      Responsable
      <input [(ngModel)]="filtros.responsable" type="text" placeholder="Todos" />
    </label>

    <label>
      Prioridad
      <select [(ngModel)]="filtros.prioridad">
        <option value="">Todas</option>
        <option>Alta</option>
        <option>Media</option>
        <option>Baja</option>
      </select>
    </label>

    <label>
      Estado
      <select [(ngModel)]="filtros.estado">
        <option value="">Todos</option>
        <option>Pendiente</option>
        <option>En curso</option>
        <option>Cerrada</option>
        <option>Cancelada</option>
      </select>
    </label>
  </app-filter-panel>

  <app-data-table
    title="Listado de solicitudes"
    [columns]="columnas"
    [rows]="solicitudesPaginadas"
    [total]="solicitudesFiltradas.length"
    [page]="paginaActual"
    [pageSize]="registrosPorPagina"
    [loading]="cargando"
    [errorMessage]="errorCarga"
    loadingMessage="Cargando solicitudes..."
    [rowId]="obtenerIdSolicitud"
    [actions]="acciones"
    [selectedIds]="seleccionados"
    emptyTitle="No hay solicitudes para mostrar"
    emptyMessage="Ajusta los filtros o limpia la búsqueda para volver al listado completo."
    (selectedIdsChange)="seleccionados = $event"
    (pageChange)="cambiarPagina($event)"
    (pageSizeChange)="cambiarRegistrosPorPagina($event)"
    (actionClick)="manejarAccionTabla($event)"
    (clear)="limpiarFiltros()"
    (retry)="cargarSolicitudes()"
  ></app-data-table>
</main>

<app-solicitud-form-modal
  *ngIf="mostrarFormulario"
  [idSolicitud]="solicitudSeleccionadaId"
  [modo]="modoFormulario"
  (cerrar)="cerrarFormulario()"
></app-solicitud-form-modal>

<app-confirm-dialog
  *ngIf="mostrarConfirmacionCancelacion"
  titulo="Cancelar solicitud"
  mensaje="Esta acción cambiará el estado de la solicitud a Cancelada."
  [detalle]="'Solicitud seleccionada: ' + solicitudSeleccionadaId"
  textoCancelar="Volver"
  textoConfirmar="Confirmar cancelación"
  variante="danger"
  (cancelar)="cerrarConfirmacionCancelacion()"
  (confirmar)="confirmarCancelacionSolicitud()"
></app-confirm-dialog>

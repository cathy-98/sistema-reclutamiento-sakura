<div class="confirm-backdrop" role="presentation">
  <section class="confirm-dialog" role="alertdialog" aria-modal="true" aria-labelledby="confirm-title">
    <div class="confirm-icon" [ngClass]="variante" aria-hidden="true">!</div>

    <div class="confirm-content">
      <h2 id="confirm-title">{{ titulo }}</h2>
      <p>{{ mensaje }}</p>
      <small *ngIf="detalle">{{ detalle }}</small>
    </div>

    <footer class="confirm-actions">
      <button class="secondary-action" type="button" (click)="cancelar.emit()">
        {{ textoCancelar }}
      </button>
      <button class="primary-action" [ngClass]="variante" type="button" (click)="confirmar.emit()">
        {{ textoConfirmar }}
      </button>
    </footer>
  </section>
</div>

<section class="file-dropzone">
  <div
    class="drop-area"
    [class.is-dragging]="dragging"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
  >
    <input
      #fileInput
      type="file"
      [attr.accept]="accept"
      [attr.multiple]="multiple ? '' : null"
      hidden
      (change)="onFileSelected($event)"
    />

    <div class="drop-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M12 15V4" />
        <path d="m8 8 4-4 4 4" />
        <path d="M5 15v4h14v-4" />
      </svg>
    </div>

    <div class="drop-copy">
      <strong>{{ title }}</strong>
      <span>{{ description }}</span>
      <small>Formatos permitidos: {{ allowedText }} · Máx. {{ maxFileSizeMb }} MB por archivo</small>
    </div>

    <app-button variant="ghost" (pressed)="fileInput.click()">{{ buttonText }}</app-button>
  </div>

  <p class="drop-error" *ngIf="error">{{ error }}</p>

  <app-file-list [files]="files" (clear)="clearFiles()" (remove)="removeFile($event)"></app-file-list>
</section>

<section class="file-dropzone">
  <div
    class="drop-area"
    [class.is-dragging]="dragging"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
  >
    <input
      #fileInput
      type="file"
      [attr.accept]="accept"
      [attr.multiple]="multiple ? '' : null"
      hidden
      (change)="onFileSelected($event)"
    />

    <div class="drop-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M12 15V4" />
        <path d="m8 8 4-4 4 4" />
        <path d="M5 15v4h14v-4" />
      </svg>
    </div>

    <div class="drop-copy">
      <strong>{{ title }}</strong>
      <span>{{ description }}</span>
      <small>Formatos permitidos: {{ allowedText }} · Máx. {{ maxFileSizeMb }} MB por archivo</small>
    </div>

    <button type="button" (click)="fileInput.click()">{{ buttonText }}</button>
  </div>

  <p class="drop-error" *ngIf="error">{{ error }}</p>

  <div class="file-list" *ngIf="files.length > 0">
    <header>
      <strong>{{ files.length }} archivo{{ files.length === 1 ? '' : 's' }} listo{{ files.length === 1 ? '' : 's' }}</strong>
      <button type="button" (click)="clearFiles()">Limpiar</button>
    </header>

    <ul>
      <li *ngFor="let file of files">
        <span>{{ file.name }}</span>
        <small>{{ file.size / 1024 / 1024 | number: '1.1-1' }} MB</small>
        <button type="button" [attr.aria-label]="'Quitar ' + file.name" (click)="removeFile(file)">×</button>
      </li>
    </ul>
  </div>
</section>
